name: Generate API Documentation

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'core/src/**/*.rs'
      - 'control-plane/**/*.go'
  workflow_dispatch:

jobs:
  # ==================== Rust Data Plane OpenAPI ====================
  generate-rust-openapi:
    name: Generate Rust OpenAPI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Generate OpenAPI
        run: |
          cd core
          cargo run --bin generate-openapi -- --format both --output ../docs/api/data-plane

      - name: Upload OpenAPI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: data-plane-openapi
          path: docs/api/data-plane/
          retention-days: 30

      - name: Commit and push changes
        if: github.event_name == 'push'
        run: |
          git config --local user.email "ci@veridactus.ai"
          git config --local user.name "VERIDACTUS CI"
          git add docs/api/data-plane/
          git diff --staged --quiet || git commit -m "ci: auto-generate Rust OpenAPI spec [skip ci]"
          git push

  # ==================== Go Control Plane Swagger ====================
  generate-go-swagger:
    name: Generate Go Swagger
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Generate Swagger
        run: |
          cd control-plane
          swag init -g cmd/server/main.go -o ../docs/api/control-plane

      - name: Upload Swagger artifacts
        uses: actions/upload-artifact@v4
        with:
          name: control-plane-swagger
          path: docs/api/control-plane/
          retention-days: 30

      - name: Commit and push changes
        if: github.event_name == 'push'
        run: |
          git config --local user.email "ci@veridactus.ai"
          git config --local user.name "VERIDACTUS CI"
          git add docs/api/control-plane/
          git diff --staged --quiet || git commit -m "ci: auto-generate Go Swagger spec [skip ci]"
          git push

  # ==================== Python FastAPI OpenAPI ====================
  generate-python-openapi:
    name: Generate Python OpenAPI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd python-worker
          pip install fastapi uvicorn

      - name: Generate OpenAPI
        run: |
          python -c "
          from fastapi.openapi.utils import get_openapi
          from app.main import app
          import json
          import os
          os.makedirs('docs/api/python-worker', exist_ok=True)
          
          openapi = get_openapi(
              title=app.title,
              version=app.version,
              description=app.description,
              routes=app.routes,
          )
          
          with open('docs/api/python-worker/openapi.json', 'w') as f:
              json.dump(json.loads(openapi.model_dump_json(by_alias=True)), f, indent=2)
          print('Generated: docs/api/python-worker/openapi.json')
          "

      - name: Upload OpenAPI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-worker-openapi
          path: docs/api/python-worker/
          retention-days: 30

  # ==================== Deploy API Documentation ====================
  deploy-api-docs:
    name: Deploy API Documentation
    runs-on: ubuntu-latest
    needs: [generate-rust-openapi, generate-go-swagger, generate-python-openapi]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: docs/api/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/api
          destination_dir: api
