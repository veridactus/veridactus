# =============================================================================
# VERIDACTUS Docker Compose - Application Stack
# Production-ready deployment with all components
#
# Project: VERIDACTUS - Trusted AI Execution Governance
# License: Apache-2.0
# Source: https://github.com/veridactus/veridactus
#
# Usage:
#   # Start all services
#   docker compose -f deploy/docker-compose.yml up -d
#
#   # Start with MinIO initialization (first run)
#   docker compose -f deploy/docker-compose.yml --profile init up -d
#
#   # Start with local Ollama LLM
#   docker compose -f deploy/docker-compose.yml --profile ollama up -d
#
#   # Start with Python Worker
#   docker compose -f deploy/docker-compose.yml --profile worker up -d
#
#   # Stop all services
#   docker compose -f deploy/docker-compose.yml down
#
#   # Stop and remove volumes (clean slate)
#   docker compose -f deploy/docker-compose.yml down -v
#
# Environment variables (create .env file in project root):
#   See .env.example for full list
# =============================================================================

services:
  # ==================== VERIDACTUS Core (Rust Data Plane) ====================
  veridactus-core:
    image: veridactus/veridactus-core:main
    container_name: veridactus-core
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - VERIDACTUS_ADMIN_KEY=${VERIDACTUS_ADMIN_KEY}
      - VERIDACTUS_MODE=${VERIDACTUS_MODE:-passthrough}
      - VERIDACTUS_UPSTREAM_URL=${VERIDACTUS_UPSTREAM_URL:-https://open.bigmodel.cn}
      - VERIDACTUS_UPSTREAM_KEY=${VERIDACTUS_UPSTREAM_KEY}
      - VERIDACTUS_CONTROL_PLANE_URL=http://veridactus-cp:8081
      - VERIDACTUS_STORE_REDIS_HOST=redis
      - VERIDACTUS_STORE_REDIS_PORT=6379
      - VERIDACTUS_STORE_POSTGRES_HOST=postgres
      - VERIDACTUS_STORE_POSTGRES_PORT=5432
      - VERIDACTUS_STORE_POSTGRES_DB=veridactus
      - VERIDACTUS_STORE_POSTGRES_USER=veridactus
      - VERIDACTUS_STORE_POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-veridactus}
      - VERIDACTUS_STORE_S3_ENDPOINT=http://minio:9000
      - VERIDACTUS_STORE_S3_BUCKET=veridactus
      - VERIDACTUS_STORE_S3_ACCESS_KEY=${MINIO_ROOT_USER:-veridactus}
      - VERIDACTUS_STORE_S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-veridactus123}
      - VERIDACTUS_STORE_S3_REGION=${MINIO_REGION:-us-east-1}
      - TZ=${TIMEZONE:-UTC}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      veridactus-cp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - veridactus-network
    volumes:
      - veridactus-core-logs:/app/logs
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ==================== VERIDACTUS Control Plane (Go) ====================
  veridactus-cp:
    image: veridactus/veridactus-cp:main
    container_name: veridactus-cp
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - VERIDACTUS_CP_PORT=8081
      - VERIDACTUS_CP_DB_PATH=/app/veridactus.db
      - VERIDACTUS_CP_ADMIN_KEY=${VERIDACTUS_ADMIN_KEY}
      - VERIDACTUS_CP_CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      - TZ=${TIMEZONE:-UTC}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - veridactus-network
    volumes:
      - veridactus-cp-data:/app
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ==================== VERIDACTUS Frontend (React/Nginx) ====================
  veridactus-ui:
    image: veridactus/veridactus-ui:main
    container_name: veridactus-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8081
      - VITE_WS_URL=ws://localhost:8080
      - TZ=${TIMEZONE:-UTC}
    depends_on:
      veridactus-cp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - veridactus-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ==================== Infrastructure Services ====================

  redis:
    image: redis:7-alpine
    container_name: veridactus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - veridactus-network
    volumes:
      - redis-data:/data
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  postgres:
    image: postgres:16-alpine
    container_name: veridactus-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=veridactus
      - POSTGRES_USER=veridactus
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-veridactus}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=C --lc-ctype=C
      - TZ=${TIMEZONE:-UTC}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veridactus -d veridactus"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - veridactus-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  minio:
    image: minio/minio:latest
    container_name: veridactus-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-veridactus}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-veridactus123}
      - MINIO_REGION=${MINIO_REGION:-us-east-1}
      - TZ=${TIMEZONE:-UTC}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - veridactus-network
    volumes:
      - minio-data:/data
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ==================== MinIO Bucket Initialization ====================
  minio-init:
    image: minio/mc:latest
    container_name: veridactus-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc config host add minio http://minio:9000 \$MINIO_ROOT_USER \$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing minio/veridactus;
      mc mb --ignore-existing minio/veridactus-traces;
      mc mb --ignore-existing minio/veridactus-backups;
      mc policy set public minio/veridactus;
      echo 'MinIO buckets initialized successfully';
      exit 0;
      "
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-veridactus}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-veridactus123}
      - TZ=${TIMEZONE:-UTC}
    networks:
      - veridactus-network
    security_opt:
      - no-new-privileges:true
    profiles:
      - init

  # ==================== Optional: Ollama (Local LLM) ====================
  ollama:
    image: ollama/ollama:latest
    container_name: veridactus-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - TZ=${TIMEZONE:-UTC}
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - veridactus-network
    security_opt:
      - no-new-privileges:true
    profiles:
      - ollama
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # ==================== Optional: Python Worker (PII Detection) ====================
  python-worker:
    image: veridactus/veridactus-python-worker:main
    container_name: veridactus-python-worker
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WORKER_LOG_LEVEL=${WORKER_LOG_LEVEL:-info}
      - TZ=${TIMEZONE:-UTC}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - veridactus-network
    security_opt:
      - no-new-privileges:true
    profiles:
      - worker
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

# =============================================================================
# Networks
# =============================================================================
networks:
  veridactus-network:
    driver: bridge
    name: veridactus-network
    ipam:
      config:
        - subnet: 172.20.0.0/16

# =============================================================================
# Volumes
# =============================================================================
volumes:
  redis-data:
    name: veridactus-redis-data
    driver: local
  postgres-data:
    name: veridactus-postgres-data
    driver: local
  minio-data:
    name: veridactus-minio-data
    driver: local
  ollama-data:
    name: veridactus-ollama-data
    driver: local
  veridactus-cp-data:
    name: veridactus-cp-data
    driver: local
  veridactus-core-logs:
    name: veridactus-core-logs
    driver: local

