# ╔══════════════════════════════════════════════════════════════════════╗
# ║              VERIDACTUS — Production Deployment Stack                ║
# ║  AI Execution Governance Infrastructure                              ║
# ╚══════════════════════════════════════════════════════════════════════╝
#
# 部署 Profiles:
#   docker compose up -d                           # 核心服务 (PG+Redis+MinIO+CP+DP+UI)
#   docker compose --profile worker up -d          # + Python Worker
#   docker compose --profile observability up -d   # + ClickHouse+Jaeger+Grafana
#   docker compose --profile ollama up -d          # + Ollama (本地LLM)
#   docker compose --profile full up -d            # 全部服务
#   docker compose --profile init up               # 仅初始化 (MinIO buckets)
#
# 网络: 10.10.0.0/16 (veridactus-net)
# 卷:   veridactus-pg-data, veridactus-redis-data, veridactus-minio-data
#       veridactus-ch-data, veridactus-jaeger-data, veridactus-grafana-data

# ═══════════════════════════════════════════════════════════════════════
# 共享配置
# ═══════════════════════════════════════════════════════════════════════
x-veridactus-env: &veridactus-env
  JWT_SECRET: ${JWT_SECRET:-veridactus-jwt-production-secret}
  VERIDACTUS_ADMIN_KEY: ${VERIDACTUS_ADMIN_KEY:-vd-admin-prod}
  VERIDACTUS_MASTER_KEY: ${VERIDACTUS_MASTER_KEY}
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  PG_HOST: postgres
  PG_PORT: "5432"
  PG_USER: veridactus
  PG_PASS: ${PG_PASSWORD:-veridactus}
  PG_DB_NAME: veridactus
  PG_SSLMODE: disable
  STORE_BACKEND: postgres
  DATA_PLANE_URL: http://veridactus-core:8080
  VERIDACTUS_ENV: ${VERIDACTUS_ENV:-production}

x-healthcheck-defaults: &healthcheck-defaults
  interval: 15s
  timeout: 5s
  retries: 3
  start_period: 30s

services:
  # ═══════════════════════════════════════════════════════════════════
  # 基础设施层
  # ═══════════════════════════════════════════════════════════════════

  # PostgreSQL 16 — 业务数据存储（多租户）
  postgres:
    image: postgres:16-alpine
    container_name: veridactus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: veridactus
      POSTGRES_PASSWORD: ${PG_PASSWORD:-veridactus}
      POSTGRES_DB: veridactus
    volumes:
      - veridactus-pg-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U veridactus -d veridactus"]
    networks:
      - veridactus-net

  # Redis 7 — 预算计数器 + 限流令牌桶 + Stream 异步分发
  redis:
    image: redis:7-alpine
    container_name: veridactus-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - veridactus-redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "ping"]
    networks:
      - veridactus-net

  # MinIO — 对象存储（Raw Trace JSON + L2B ZK 证明）
  minio:
    image: minio/minio:latest
    container_name: veridactus-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-veridactus}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-veridactus-minio-pwd}
    volumes:
      - veridactus-minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
    networks:
      - veridactus-net

  # MinIO Bucket 初始化
  minio-init:
    image: minio/mc:latest
    container_name: veridactus-minio-init
    profiles: ["init", "full"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set veridactus http://minio:9000 ${MINIO_USER:-veridactus} ${MINIO_PASSWORD:-veridactus-minio-pwd};
      mc mb veridactus/veridactus --ignore-existing;
      mc mb veridactus/veridactus-traces --ignore-existing;
      mc mb veridactus/veridactus-backups --ignore-existing;
      mc policy set public veridactus/veridactus-traces;
      echo 'MinIO buckets initialized';
      "
    networks:
      - veridactus-net

  # ═══════════════════════════════════════════════════════════════════
  # 可观测性层 (profile: observability)
  # ═══════════════════════════════════════════════════════════════════

  # ClickHouse — OLAP 审计事件 + Trace 聚合（FinOps 秒级查询）
  clickhouse:
    image: clickhouse/clickhouse-server:latest-alpine
    container_name: veridactus-clickhouse
    profiles: ["observability", "full"]
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: veridactus
      CLICKHOUSE_USER: veridactus
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-veridactus}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - veridactus-ch-data:/var/lib/clickhouse
      - ./clickhouse-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "8123:8123"   # HTTP
      - "9009:9009"   # Native
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
    networks:
      - veridactus-net

  # Jaeger — 分布式调用链追踪可视化
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: veridactus-jaeger
    profiles: ["observability", "full"]
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    volumes:
      - veridactus-jaeger-data:/badger
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    networks:
      - veridactus-net

  # Grafana — 统一监控仪表盘
  grafana:
    image: grafana/grafana:latest
    container_name: veridactus-grafana
    profiles: ["observability", "full"]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-veridactus}
      GF_INSTALL_PLUGINS: "grafana-clickhouse-datasource"
    volumes:
      - veridactus-grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    networks:
      - veridactus-net

  # ═══════════════════════════════════════════════════════════════════
  # 应用服务层
  # ═══════════════════════════════════════════════════════════════════

  # Go 控制平面 — 多租户管理 + Auth + Key 解析
  veridactus-cp:
    image: ${CP_IMAGE:-veridactus/veridactus-cp}:${TAG:-latest}
    container_name: veridactus-cp
    build:
      context: ../control-plane
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *veridactus-env
      PORT: "8081"
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      VERIDACTUS_KMS_TYPE: ${KMS_TYPE:-env}
      VERIDACTUS_PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-alipay}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/v1/health"]
    networks:
      - veridactus-net

  # Rust 数据平面 — Chat 代理 + 治理插件 + 密码学证明
  veridactus-core:
    image: ${CORE_IMAGE:-veridactus/veridactus-core}:${TAG:-latest}
    container_name: veridactus-core
    build:
      context: ../core
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *veridactus-env
      PORT: "8080"
      REDIS_URL: redis://redis:6379
      CONTROL_PLANE_URL: http://veridactus-cp:8081
      VERIDACTUS_STORE_S3_ENDPOINT: http://minio:9000
      VERIDACTUS_STORE_S3_BUCKET: veridactus-traces
      VERIDACTUS_STORE_S3_ACCESS_KEY: ${MINIO_USER:-veridactus}
      VERIDACTUS_STORE_S3_SECRET_KEY: ${MINIO_PASSWORD:-veridactus-minio-pwd}
      CLICKHOUSE_URL: ${CH_URL:-http://clickhouse:8123}
      CLICKHOUSE_DB: veridactus
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "8080:8080"
    depends_on:
      veridactus-cp:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
    networks:
      - veridactus-net

  # React 前端 — Nginx 静态托管
  veridactus-ui:
    image: ${UI_IMAGE:-veridactus/veridactus-ui}:${TAG:-latest}
    container_name: veridactus-ui
    build:
      context: ../veridactus-ui
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${UI_API_URL:-}
    restart: unless-stopped
    environment:
      NGINX_PORT: "80"
    ports:
      - "${UI_PORT:-3000}:80"
    depends_on:
      - veridactus-cp
      - veridactus-core
    networks:
      - veridactus-net

  # Python Worker — 异步任务消费 (profile: worker)
  python-worker:
    image: ${WORKER_IMAGE:-veridactus/veridactus-python-worker}:${TAG:-latest}
    container_name: veridactus-python-worker
    profiles: ["worker", "full"]
    build:
      context: ../python-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CONTROL_PLANE_URL: http://veridactus-cp:8081
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - veridactus-net

  # ═══════════════════════════════════════════════════════════════════
  # 可选：本地 LLM (profile: ollama)
  # ═══════════════════════════════════════════════════════════════════

  ollama:
    image: ollama/ollama:latest
    container_name: veridactus-ollama
    profiles: ["ollama", "full-local"]
    restart: unless-stopped
    volumes:
      - veridactus-ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_HOST: 0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - veridactus-net

# ═══════════════════════════════════════════════════════════════════════
# 卷定义
# ═══════════════════════════════════════════════════════════════════════
volumes:
  veridactus-pg-data:
    name: veridactus-pg-data
  veridactus-redis-data:
    name: veridactus-redis-data
  veridactus-minio-data:
    name: veridactus-minio-data
  veridactus-ch-data:
    name: veridactus-ch-data
  veridactus-jaeger-data:
    name: veridactus-jaeger-data
  veridactus-grafana-data:
    name: veridactus-grafana-data
  veridactus-ollama-data:
    name: veridactus-ollama-data

# ═══════════════════════════════════════════════════════════════════════
# 网络定义
# ═══════════════════════════════════════════════════════════════════════
networks:
  veridactus-net:
    name: veridactus-net
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/16
