{{- if .Values.coreDataPlane.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-veridactus-core
  labels:
    app.kubernetes.io/name: veridactus-core
    app.kubernetes.io/component: data-plane
spec:
  replicas: {{ .Values.coreDataPlane.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: veridactus-core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: veridactus-core
        app.kubernetes.io/component: data-plane
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: core
          image: "{{ .Values.coreDataPlane.image.repository }}:{{ .Values.coreDataPlane.image.tag }}"
          ports:
            - containerPort: 8080
              name: http
          env:
            {{- range $k, $v := .Values.coreDataPlane.env }}
            - name: {{ $k }}
              value: {{ tpl $v $ | quote }}
            {{- end }}
          resources: {{- toYaml .Values.coreDataPlane.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-veridactus-core
spec:
  type: {{ .Values.coreDataPlane.service.type }}
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app.kubernetes.io/name: veridactus-core
{{- end }}
