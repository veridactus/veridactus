{{- /*
Secret Template for Veridactus Core - stores sensitive configuration
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "veridactus-core.fullname" . }}
  labels:
    {{- include "veridactus-core.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-key: {{ required "config.adminKey is required" .Values.config.adminKey | quote }}
  {{- if .Values.config.upstreamLLM.apiKey }}
  upstream-api-key: {{ .Values.config.upstreamLLM.apiKey | quote }}
  {{- end }}
  postgres-password: {{ required "config.store.postgres.password is required" .Values.config.store.postgres.password | quote }}
